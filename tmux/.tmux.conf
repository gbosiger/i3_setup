# Terminal
set-option -g default-terminal "tmux-direct"
set-option -as terminal-features ",xterm-kitty:RGB,tmux-256color:RGB,tmux-direct:RGB"
# Do not inherit Kitty's private TERMINFO path into tmux panes.
# Inside tmux, TERM becomes tmux-direct, which lives in the system terminfo db.
set-environment -gu TERMINFO
set-environment -gu TERMINFO_DIRS

# General behavior
set-window-option -g mode-keys vi
set -g mouse on

# Reload and paste
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
unbind p
bind p paste-buffer

# Vim-like pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Copy mode (vi)
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set-option -g status-position top
set -g status-interval 1
set -g status-left ""
set -g status-right ""
set -g status-left-length 120
set -g status-right-length 0
set -g status-style "fg=default,bg=default"

# Messages and command prompt
set -g message-style "fg=colour0,bg=colour12"
set -g message-command-style "fg=colour0,bg=colour12,bold"
set -g mode-style "fg=colour0,bg=colour12,bold"
set -g menu-style "fg=default,bg=default"
set -g menu-selected-style "fg=colour7,bg=colour8"

# Pane borders (ANSI slots -> auto-follow kitty color0-15 updates)
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour12"

# Window list
set -g window-status-separator ""
set -g window-status-style "fg=default,bg=default"
set -g window-status-current-style "fg=default,bg=default"

# Inactive window: number box uses kitty inactive tab colors
set -g window-status-format "#[fg=colour3,bg=colour15] #I #[fg=colour3,bg=colour15,nobold,nounderscore,noitalics] #W "
# Active window: number box uses kitty active tab colors (true catppuccin mauve from your files)
set -g window-status-current-format "#[fg=colour15,bg=colour2,bold] #I #[fg=colour3,bg=colour8,nobold,nounderscore,noitalics] #W "


# Optional activity/bell accents
set -g window-status-activity-style "fg=colour0,bg=colour13,bold"
set -g window-status-bell-style "fg=colour0,bg=colour13,bold"

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# TPM (must stay last)
run '~/.tmux/plugins/tpm/tpm'
