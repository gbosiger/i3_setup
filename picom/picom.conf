backend = "glx";

shadow = true;
shadow-radius = 20;
shadow-opacity = 0.3;

detect-rounded-corners = true;
shadow-ignore-shaped = false;

shadow-exclude = [
  "class_g = 'i3-frame'",
  "override_redirect = true",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'menu'",
  "window_type = 'tooltip'"
];

wintypes: {
  dropdown_menu = { shadow = false; };
  popup_menu = { shadow = false; };
  menu = { shadow = false; };
  tooltip = { shadow = false; };
};
