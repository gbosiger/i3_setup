# target                 border    bg         text      indicator  child_border
client.focused           $mauve    $mauve     $crust    $base      $mauve
client.focused_inactive  $blue     $blue      $blue     $base      $base
client.unfocused         $base     $surface2  $text     $base      $base
client.urgent            $peach    $base      $peach    $overlay0  $peach
client.placeholder       $overlay0 $base      $text     $base      $overlay0
client.background        $base

# Font for window titles. Will also be used by the bar unless a different font
# is used in the bar {} block below.
font pango:JetBrainsMono Nerd Font 0

# bar
bar {
  font pango:JetBrainsMono Nerd Font 11
  tray_output primary
  colors {
    background         $base
    statusline         $text
    focused_statusline $text
    focused_separator  $base

    # target           border     bg        text
    focused_workspace  $mauve     $mauve    $crust
    active_workspace   $surface1  $surface2 $text
    inactive_workspace $base      $base     $text
    urgent_workspace   $base      $red      $crust
  }
}

# Hide window title bar
default_border normal 3
default_floating_border normal 3
for_window [class="^.*"] border pixel 3

hide_edge_borders smart
smart_borders on
gaps inner 8
gaps outer 3

# Do not display window titles in the title bar, instead use a symbol to indicate the focused window
#for_window [class=".*"] title_format "■"
#for_window [class=".*"] title_format " ● "
