# Regolith does not match the installed polkit-gnome autostart rules,
# so start an authentication agent explicitly for GUI privilege prompts.
exec_always --no-startup-id sh -c 'pgrep -u "$USER" -f "/usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1" >/dev/null || exec /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1'
