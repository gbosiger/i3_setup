# Include Catppuccin theme variables and styling
include ~/.config/i3/themes/catppuccin/catppuccin-current
include ~/.config/i3/themes/catppuccin/catppuccin.conf
include ~/.config/i3/globalprotect.conf
include ~/.config/i3/kitty.conf

# Keep cursor theme consistent across app windows and root background.
exec_always --no-startup-id sh -c 'command -v xsettingsd >/dev/null 2>&1 && pgrep -x xsettingsd >/dev/null 2>&1 || xsettingsd -c "$HOME/.config/xsettingsd/xsettingsd.conf" >/dev/null 2>&1 &'
exec_always --no-startup-id ~/.config/i3/scripts/apply-root-cursor.sh

# Keep title text effectively hidden for thin tab lines
font pango:JetBrainsMono Nerd Font 0
