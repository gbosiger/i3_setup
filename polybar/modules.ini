[module/launcher]
type = custom/text
content = 󰣇
content-foreground = ${colors.mauve}
content-padding = 1
click-left = rofi -show drun

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
enable-scroll = false
strip-wsnumbers = false

format = <label-state>

label-focused = %index%
label-focused-background = ${colors.mauve}
label-focused-foreground = ${colors.base}
label-focused-padding = 2

label-visible = %index%
label-visible-background = ${colors.surface0}
label-visible-foreground = ${colors.text}
label-visible-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.subtext0}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.subtext1}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = 󰍛 %percentage%%

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = 󰘚 %percentage_used%%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
label-volume-foreground = ${colors.text}

label-muted = 󰖁 mute
label-muted-foreground = ${colors.subtext0}

click-right = pavucontrol

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
label-connected = 󰖩 %essid%
format-disconnected = <label-disconnected>
label-disconnected = 󰖪 down
label-disconnected-foreground = ${colors.subtext0}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC

format-charging = <label-charging>
label-charging = 󰂄 %percentage%%

format-discharging = <label-discharging>
label-discharging = 󰁹 %percentage%%

format-full = <label-full>
label-full = 󰂅 full

[module/date]
type = internal/date
interval = 5
date = %a %d %b  %H:%M
label = 󰥔 %date%

[module/powermenu]
type = custom/text
content = 󰐥
content-foreground = ${colors.red}
content-padding = 1
click-left = rofi -show power-menu -modi power-menu:~/.local/bin/rofi-power-menu
