[module/i3]
type = internal/i3
format = <label-state>

label-focused = %name%
label-focused-background = ${colors.mauve}
label-focused-foreground = ${colors.crust}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.subtext}

label-visible = %name%
label-visible-background = ${colors.surface0}
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 2



[module/date]
type = internal/date
interval = 5

date = %H:%M  %d.%m.%Y
label = %date%



[module/cpu]
type = internal/cpu
interval = 2
format = CPU %percentage%%



[module/memory]
type = internal/memory
interval = 2
format = RAM %percentage_used%%



[module/volume]
type = internal/pulseaudio

format-volume = VOL %percentage%%
label-muted = muted



[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

format-charging = ⚡ %percentage%%
format-discharging = %percentage%%
format-full = full
