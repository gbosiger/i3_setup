include-file = ~/.config/polybar/themes/current.ini
include-file = ~/.config/polybar/modules.ini

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 22 
radius = 0

background = ${colors.base}
foreground = ${colors.text}

border-size = 0
padding-left = 0
padding-right = 2
padding-top = 0
module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Font Awesome 6 Free:size=10;2
font-2 = Noto Color Emoji:size=10;2

modules-left = i3
modules-center = xwindow
modules-right = cpu memory pulseaudio network battery date

tray-position = ${env:TRAY_POSITION:none}
tray-padding = 3

wm-restack = i3
override-redirect = false
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize
