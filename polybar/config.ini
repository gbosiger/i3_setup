include-file = ~/.config/polybar/themes/current.ini
include-file = ~/.config/polybar/modules.ini

[bar/main]
width = 100%
height = 34
radius = 12

background = ${colors.base}
foreground = ${colors.text}

border-size = 0
padding-left = 2
padding-right = 2
module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=11;2

modules-left = launcher i3
modules-center = xwindow
modules-right = cpu memory pulseaudio network battery date powermenu

tray-position = right
tray-padding = 6

wm-restack = i3
override-redirect = false
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize
